<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

        .sidebar { width: 250px; height: 100vh; position: fixed; top: 0; left: 0; }
        .main-content { margin-left: 250px; padding: 20px; }
    </style>
</head>
<body class="bg-light">

    <div class="sidebar bg-dark text-white p-3">
        <h4>Admin Panel</h4>
        <div class="list-group list-group-flush mt-4">
            <a href="#" class="list-group-item bg-dark text-white">Dashboard</a>
            <a href="#" class="list-group-item bg-dark text-white">Đơn hàng</a>
            <a href="#" class="list-group-item bg-dark text-white">Khách hàng</a>
        </div>
    </div>

    <main class="main-content">
        <nav class="navbar navbar-expand-lg navbar-light bg-white border-bottom mb-4">

                <nav aria-label="breadcrumb"><ol class="breadcrumb"><li class="breadcrumb-item"><a href="#">Home</a></li><li class="breadcrumb-item active">Dashboard</li></ol></nav>

                </div>
            </div>
        </nav>

        <div class="row mb-4">
            <div class="col-3"><div class="card bg-primary text-white p-3">Đơn hàng: 100</div></div>

            <div class="col-3"><div class="card bg-danger text-white p-3">Lỗi: 2</div></div>
        </div>

        <table class="table table-striped table-hover bg-white mb-4">
            <thead class="table-dark"><tr><th>ID</th><th>Khách</th><th>Trạng thái</th></tr></thead>
            <tbody><tr><td>#01</td><td>Nguyễn Văn A</td><td>Đang giao</td></tr></tbody>
        </table>

        <div class="input-group mb-4"><input class="form-control" placeholder="Tìm kiếm..."><button class="btn btn-primary">Lọc</button></div>
        <div class="alert alert-success">Cập nhật đơn hàng thành công!</div>
        
        <div class="accordion" id="faq">
            <div class="accordion-item"><h2 class="accordion-header"><button class="accordion-button" data-bs-toggle="collapse" data-bs-target="#q1">FAQ 1?</button></h2><div id="q1" class="accordion-collapse collapse" data-bs-parent="#faq"><div class="accordion-body">Trả lời...</div></div></div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
